<!DOCTYPE html>
<html>
<head>
  <title>Generate Limitr Icons</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #1a1a2e; color: #fff; }
    .theme-section { margin: 20px 0; }
    .theme-section h2 { margin-bottom: 10px; }
    .icons { display: flex; gap: 20px; flex-wrap: wrap; margin: 10px 0; }
    .icon-box { text-align: center; }
    canvas { border: 1px solid #333; }
    button { padding: 10px 20px; background: #4f46e5; color: #fff; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <h1>Limitr Icon Generator</h1>
  <p>Three icon variants: default (purple, for manifest), active (gold, when processing), gray (when inactive).</p>

  <div id="output"></div>

  <button onclick="downloadAll()">Download All Icons</button>

  <script>
    const sizes = [16, 32, 48, 128];
    const themes = {
      '': { label: 'Default (Purple)', grad: ['#4f46e5', '#7c3aed'], stroke: '#fff' },
      '-active': { label: 'Active (Gold)', grad: ['#d97706', '#f59e0b'], stroke: '#fff' },
      '-gray': { label: 'Inactive (Gray)', grad: ['#4b5563', '#6b7280'], stroke: '#9ca3af' },
    };

    function drawIcon(canvas, size, theme) {
      const ctx = canvas.getContext('2d');

      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, theme.grad[0]);
      gradient.addColorStop(1, theme.grad[1]);

      // Rounded rectangle background
      const radius = size * 0.15;
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, radius);
      ctx.fillStyle = gradient;
      ctx.fill();

      // Draw audio waveform / limiter symbol
      ctx.strokeStyle = theme.stroke;
      ctx.lineWidth = Math.max(1.5, size * 0.06);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      const margin = size * 0.2;
      const centerY = size / 2;
      const waveHeight = size * 0.25;

      // Input wave (left side, taller)
      ctx.beginPath();
      ctx.moveTo(margin, centerY);
      ctx.lineTo(margin + size * 0.1, centerY - waveHeight);
      ctx.lineTo(margin + size * 0.2, centerY + waveHeight * 0.8);
      ctx.lineTo(margin + size * 0.3, centerY - waveHeight * 0.6);
      ctx.stroke();

      // Limiter line (ceiling)
      ctx.beginPath();
      ctx.setLineDash([size * 0.03, size * 0.03]);
      ctx.moveTo(size * 0.35, centerY - waveHeight * 0.4);
      ctx.lineTo(size * 0.85, centerY - waveHeight * 0.4);
      ctx.stroke();
      ctx.setLineDash([]);

      // Output wave (right side, compressed)
      ctx.beginPath();
      ctx.moveTo(size * 0.55, centerY);
      ctx.lineTo(size * 0.62, centerY - waveHeight * 0.35);
      ctx.lineTo(size * 0.69, centerY + waveHeight * 0.3);
      ctx.lineTo(size * 0.76, centerY - waveHeight * 0.25);
      ctx.stroke();

      return canvas;
    }

    function download(size, suffix) {
      const canvas = document.getElementById(`icon${size}${suffix}`);
      const link = document.createElement('a');
      link.download = `icon${size}${suffix}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function downloadAll() {
      let i = 0;
      for (const suffix of Object.keys(themes)) {
        for (const size of sizes) {
          setTimeout(() => download(size, suffix), i * 100);
          i++;
        }
      }
    }

    // Build UI and draw all icons
    const output = document.getElementById('output');
    for (const [suffix, theme] of Object.entries(themes)) {
      const section = document.createElement('div');
      section.className = 'theme-section';
      section.innerHTML = `<h2>${theme.label}</h2>`;
      const row = document.createElement('div');
      row.className = 'icons';
      for (const size of sizes) {
        const box = document.createElement('div');
        box.className = 'icon-box';
        const canvas = document.createElement('canvas');
        canvas.id = `icon${size}${suffix}`;
        canvas.width = size;
        canvas.height = size;
        drawIcon(canvas, size, theme);
        box.appendChild(canvas);
        box.innerHTML += `<br><button onclick="download(${size}, '${suffix}')">${size}x${size}</button>`;
        row.appendChild(box);
      }
      section.appendChild(row);
      output.appendChild(section);
    }
  </script>
</body>
</html>
